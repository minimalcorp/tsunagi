name: Release

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Release target'
        required: true
        type: choice
        options:
          - all
          - tsunagi
          - docs
      version:
        description: 'Version bump (tsunagi 用 / docs には無視される)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

# 同時に2つ以上の Release workflow が走らないようにする。
# 2つ目以降は1つ目の完了を待つ (cancel はしない)。
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish-tsunagi:
    name: Publish @minimalcorp/tsunagi to npm
    if: ${{ inputs.target == 'all' || inputs.target == 'tsunagi' }}
    runs-on: ubuntu-latest
    # production-release Environment には Required reviewers を設定する想定。
    # workflow 実行時に人間の承認が必要となり、承認時に main の最新状態
    # (他 PR の merge 状況等) を目視確認する時間を強制的に確保できる。
    # Environment の作成手順は README のリリース設定セクションを参照。
    environment: production-release
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.12.0'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version (workspace)
        id: bump
        run: |
          npm version "${{ inputs.version }}" --workspace=@minimalcorp/tsunagi
          NEW_VERSION=$(node -p "require('./apps/web/package.json').version")
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          git add apps/web/package.json package-lock.json
          git commit -m "chore: release @minimalcorp/tsunagi v${NEW_VERSION}"
          # annotated tag を作成する (軽量タグだと git push --follow-tags で
          # push されないため必ず -a -m を付けること)。
          git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"

      # Push に失敗した場合は rebase してから retry する。他 PR が merge
      # されて main が進んでいた場合、rebase によって merge 済み commit を
      # 取り込んだ上で version bump commit を再適用するため、後続の
      # npm publish は merge 済みの内容を含む最新 state から行われる。
      #
      # annotated tag は rebase で自動的には移動しないので、削除 → rebase →
      # 再作成する必要がある。
      - name: Push commit and tag (with rebase retry)
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          set -u
          for attempt in 1 2 3; do
            if git push --atomic --follow-tags; then
              echo "Push succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "::warning::Push failed on attempt ${attempt}. Attempting rebase..."
            # rebase 前に tag を削除する (rebase 後に再作成する)
            git tag -d "v${NEW_VERSION}" || true
            git fetch origin main
            if ! git rebase origin/main; then
              echo "::error::Rebase conflict with origin/main. Aborting."
              git rebase --abort || true
              exit 1
            fi
            # rebase 後の新しい HEAD で annotated tag を再作成
            git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"
            # 依存関係が変わっている可能性があるので再 install
            npm ci
            sleep 2
          done
          echo "::error::Push failed after 3 attempts"
          exit 1

      - name: Publish to npm
        run: npm publish --workspace=@minimalcorp/tsunagi --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.new_version }}" \
            --title "v${{ steps.bump.outputs.new_version }}" \
            --generate-notes

  deploy-docs:
    name: Deploy docs to GitHub Pages
    if: ${{ inputs.target == 'all' || inputs.target == 'docs' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.12.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build docs (static export)
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build -w tsunagi-docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
