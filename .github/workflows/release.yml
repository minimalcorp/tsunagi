name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump (patch / minor / major)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      # Needed to push the version bump commit and tag back to the repository.
      contents: write
      # Needed for npm provenance (sigstore OIDC).
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.12.0'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          npm version "${{ inputs.version }}" -m "chore: release v%s"
          echo "new_version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Push commit and tag
        run: git push --follow-tags

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.new_version }}" \
            --title "v${{ steps.bump.outputs.new_version }}" \
            --generate-notes
