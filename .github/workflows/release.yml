name: Release

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Release target'
        required: true
        type: choice
        options:
          - all
          - tsunagi
          - docs
      version:
        description: 'Version bump (tsunagi 用 / docs には無視される)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

# 同時に2つ以上の Release workflow が走らないようにする。
# 2つ目以降は1つ目の完了を待つ (cancel はしない)。
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Unified approval gate。
  # production-release Environment には Required reviewers を設定する想定で、
  # この job が pending 状態になると GitHub UI 上で人間の承認操作が必要になる。
  # publish-tsunagi / deploy-docs 両方の job がこの job を `needs` で待つため、
  # target=all でも 1 回の承認で tsunagi + docs 両方をカバーできる。
  # 承認画面で main の最新状態 (他 PR の merge 状況等) を目視確認することで、
  # 意図しない内容のリリースを防ぐ。
  # Environment の作成手順は README のリリース設定セクションを参照。
  approve:
    name: Approve release
    runs-on: ubuntu-latest
    environment: production-release
    steps:
      - name: Record approval
        run: |
          echo "Release approved"
          echo "  target:  ${{ inputs.target }}"
          echo "  version: ${{ inputs.version }}"

  publish-tsunagi:
    name: Publish @minimalcorp/tsunagi to npm
    if: ${{ inputs.target == 'all' || inputs.target == 'tsunagi' }}
    needs: approve
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # npm Trusted Publishing (OIDC) と provenance 自動生成のため必須。
      id-token: write
    steps:
      # main 保護 ruleset を bypass するため、Deploy Key を使って checkout
      # する。actions/checkout は `ssh-key` が指定されると ephemeral な SSH
      # agent を起動して private key をロードし、git remote URL を SSH
      # (git@github.com:owner/repo.git) に設定する。以降の `git push` は
      # この deploy key で認証されて protected main に push できる。
      #
      # 事前準備:
      #   1. SSH key pair を生成し public key を Deploy keys に登録 (write access)
      #   2. private key を RELEASE_DEPLOY_KEY secret に登録
      #   3. main ruleset の Bypass list にこの Deploy key を追加
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.12.0'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # npm Trusted Publishing は npm CLI v11.5.1 以降が必要 (2025-07 GA)。
      # Node 24.12.0 同梱の npm が古い場合に備えて明示的に upgrade する。
      - name: Ensure npm >= 11.5.1 (for Trusted Publishing)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run build -w @minimalcorp/tsunagi-shared

      - name: Generate Prisma client (server)
        run: npm run db:generate -w @minimalcorp/tsunagi-server

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version (workspace)
        id: bump
        run: |
          npm version "${{ inputs.version }}" --workspace=@minimalcorp/tsunagi
          NEW_VERSION=$(node -p "require('./apps/cli/package.json').version")
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          git add apps/cli/package.json package-lock.json
          git commit -m "chore: release @minimalcorp/tsunagi v${NEW_VERSION}"
          # annotated tag を作成する (軽量タグだと git push --follow-tags で
          # push されないため必ず -a -m を付けること)。
          git tag -a "tsunagi-v${NEW_VERSION}" -m "Release tsunagi-v${NEW_VERSION}"

      # Push に失敗した場合は rebase してから retry する。他 PR が merge
      # されて main が進んでいた場合、rebase によって merge 済み commit を
      # 取り込んだ上で version bump commit を再適用するため、後続の
      # npm publish は merge 済みの内容を含む最新 state から行われる。
      #
      # annotated tag は rebase で自動的には移動しないので、削除 → rebase →
      # 再作成する必要がある。
      - name: Push commit and tag (with rebase retry)
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          set -u
          for attempt in 1 2 3; do
            if git push --atomic --follow-tags; then
              echo "Push succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "::warning::Push failed on attempt ${attempt}. Attempting rebase..."
            # rebase 前に tag を削除する (rebase 後に再作成する)
            git tag -d "tsunagi-v${NEW_VERSION}" || true
            git fetch origin main
            if ! git rebase origin/main; then
              echo "::error::Rebase conflict with origin/main. Aborting."
              git rebase --abort || true
              exit 1
            fi
            # rebase 後の新しい HEAD で annotated tag を再作成
            git tag -a "tsunagi-v${NEW_VERSION}" -m "Release tsunagi-v${NEW_VERSION}"
            # 依存関係が変わっている可能性があるので再 install
            npm ci
            npm run build -w @minimalcorp/tsunagi-shared
            npm run db:generate -w @minimalcorp/tsunagi-server
            sleep 2
          done
          echo "::error::Push failed after 3 attempts"
          exit 1

      # npm Trusted Publishing 経由で publish する (long-lived token 不要)。
      # 認証は GitHub Actions OIDC token で行われるため NODE_AUTH_TOKEN は
      # 設定しない。provenance attestation も trusted publishing 経由だと
      # 自動生成されるため `--provenance` flag は不要。
      #
      # npmjs.com 側で以下の Trusted Publisher 設定が必要:
      #   Organization: minimalcorp
      #   Repository:   tsunagi
      #   Workflow:     release.yml
      #   Environment:  production-release
      - name: Publish to npm (via Trusted Publishing)
        run: npm publish --workspace=@minimalcorp/tsunagi --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "tsunagi-v${{ steps.bump.outputs.new_version }}" \
            --title "tsunagi-v${{ steps.bump.outputs.new_version }}" \
            --generate-notes

  deploy-docs:
    name: Deploy docs to GitHub Pages
    if: ${{ inputs.target == 'all' || inputs.target == 'docs' }}
    needs: approve
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.12.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version (docs)
        id: bump
        run: |
          npm version "${{ inputs.version }}" --workspace=tsunagi-docs
          NEW_VERSION=$(node -p "require('./apps/docs/package.json').version")
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          git add apps/docs/package.json package-lock.json
          git commit -m "chore: release tsunagi-docs v${NEW_VERSION}"
          git tag -a "docs-v${NEW_VERSION}" -m "Release docs-v${NEW_VERSION}"

      - name: Push commit and tag (with rebase retry)
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          set -u
          for attempt in 1 2 3; do
            if git push --atomic --follow-tags; then
              echo "Push succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "::warning::Push failed on attempt ${attempt}. Attempting rebase..."
            git tag -d "docs-v${NEW_VERSION}" || true
            git fetch origin main
            if ! git rebase origin/main; then
              echo "::error::Rebase conflict with origin/main. Aborting."
              git rebase --abort || true
              exit 1
            fi
            git tag -a "docs-v${NEW_VERSION}" -m "Release docs-v${NEW_VERSION}"
            npm ci
            sleep 2
          done
          echo "::error::Push failed after 3 attempts"
          exit 1

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build docs (static export)
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build -w tsunagi-docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
