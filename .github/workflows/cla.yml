name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# explicitly configure permissions, in case your GITHUB_TOKEN workflow permissions are set to read-only in repository settings
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/minimalcorp/tsunagi/blob/main/CLA.md'
          # 同リポジトリの独立ブランチに署名データを保存する (orphan branch)。
          # cross-repo 書き込みが不要なのでデフォルトの GITHUB_TOKEN で動く。
          # このブランチは Settings → Rules で force push / deletion を禁止する
          # 保護ルールを設定しておくこと。
          branch: 'cla-signatures'
          allowlist: dependabot[bot],renovate[bot]
          custom-notsigned-prcomment: 'Thank you for your contribution to Tsunagi! Before we can accept this PR, please read and sign our Contributor License Agreement.'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA ✅'
