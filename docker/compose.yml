services:
  tsunagi:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    working_dir: /workspace
    user: root
    volumes:
      - ..:/workspace:cached
      - node-modules:/workspace/node_modules
      - tsunagi-data:/home/node/.tsunagi
      - ${SSH_SOCK_HOST}:${SSH_SOCK_CONTAINER}
      - ~/.gitconfig:/home/node/.gitconfig:ro
    environment:
      # Fastify(container 2791 → host 2891)を単一入口に同一オリジン配信するため、
      # API/WS 向き先の上書きは不要。host:2891 でアクセスする。
      - TSUNAGI_EXTRA_CORS_ORIGINS=http://localhost:2891
      - SSH_AUTH_SOCK=${SSH_SOCK_CONTAINER}
      # Basic 認証: ホストで両方 export して `make up` すると有効化される（未設定なら無効）。
      #   例: TSUNAGI_BASIC_AUTH_USER=tsunagi TSUNAGI_BASIC_AUTH_PASSWORD=xxxx make up
      - TSUNAGI_BASIC_AUTH_USER=${TSUNAGI_BASIC_AUTH_USER:-}
      - TSUNAGI_BASIC_AUTH_PASSWORD=${TSUNAGI_BASIC_AUTH_PASSWORD:-}
      # apps/whisper-server はユーザーがホスト側で手動起動する前提のため、
      # container からは host.docker.internal 経由でアクセスする。
      - TSUNAGI_WHISPER_SERVER_URL=http://host.docker.internal:8765
      # apps/llm-server も同様にホスト側で手動起動する前提。
      - TSUNAGI_LLM_SERVER_URL=http://host.docker.internal:8766
    ports:
      - '2891:2791'
      - '2892:2792'
      - '2893:2793'
    # root で volume 所有権と SSH socket 権限を修正後、node に切り替えて起動
    # npm run dev (root) = CLI (plugin install + web + server) + docs を concurrently
    command:
      - sh
      - -c
      - |
        chown node:node /workspace/node_modules /home/node/.tsunagi &&
        chmod 777 ${SSH_SOCK_CONTAINER} 2>/dev/null || true
        exec runuser -u node -- sh -c '
          npm ci &&
          npm run build -w @minimalcorp/tsunagi-shared &&
          npm run dev
        '

volumes:
  node-modules:
  tsunagi-data:

networks:
  default:
    name: tsunagi-ephemeral-network
